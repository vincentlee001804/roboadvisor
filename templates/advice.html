{% extends "base.html" %}

{% block title %}BNPL Checker - AI Robo-Advisor{% endblock %}

{% block content %}
<div class="max-w-4xl mx-auto">
    <h2 class="text-2xl md:text-3xl font-bold text-gray-800 mb-6 md:mb-8">⚠️ BNPL Offer Checker</h2>
    
    <!-- BNPL Checker -->
    <div class="soft-card p-4 md:p-6 mb-6 md:mb-8">
        <h3 class="text-xl font-bold text-gray-800 mb-4">Analyze a BNPL Offer</h3>
        <p class="text-gray-600 mb-4">Paste a BNPL offer to analyze hidden costs and risks</p>
        <form id="bnplForm" class="space-y-4">
            <div>
                <label class="block text-gray-700 font-semibold mb-2">Purchase Amount ($)</label>
                <input type="number" id="purchaseAmount" step="0.01" min="0" required
                       class="w-full border border-gray-300 rounded-lg px-4 py-2">
            </div>
            <div>
                <label class="block text-gray-700 font-semibold mb-2">Number of Payments</label>
                <input type="number" id="numPayments" min="1" required
                       class="w-full border border-gray-300 rounded-lg px-4 py-2">
            </div>
            <div>
                <label class="block text-gray-700 font-semibold mb-2">Interest Rate (%)</label>
                <input type="number" id="interestRate" step="0.01" min="0" required
                       class="w-full border border-gray-300 rounded-lg px-4 py-2">
            </div>
            <div>
                <label class="block text-gray-700 font-semibold mb-2">Additional Fees ($)</label>
                <input type="number" id="fees" step="0.01" min="0" value="0"
                       class="w-full border border-gray-300 rounded-lg px-4 py-2">
            </div>
            <button type="submit" id="analyzeBtn"
                    class="w-full primary-btn bg-red-600 hover:bg-red-700 text-white justify-center flex items-center disabled:opacity-50 disabled:cursor-not-allowed">
                <span id="analyzeBtnText">Analyze BNPL Offer</span>
                <span id="analyzeBtnSpinner" class="hidden ml-2">
                    <svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                </span>
            </button>
        </form>
        
        <div id="bnplResult" class="mt-6 hidden"></div>
    </div>
</div>

<script>
document.getElementById('bnplForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    // Show loading state
    const analyzeBtn = document.getElementById('analyzeBtn');
    const analyzeBtnText = document.getElementById('analyzeBtnText');
    const analyzeBtnSpinner = document.getElementById('analyzeBtnSpinner');
    const resultDiv = document.getElementById('bnplResult');
    
    analyzeBtn.disabled = true;
    analyzeBtnText.textContent = 'Analyzing...';
    analyzeBtnSpinner.classList.remove('hidden');
    resultDiv.classList.add('hidden');
    
    const offer = {
        purchase_amount: parseFloat(document.getElementById('purchaseAmount').value),
        num_payments: parseInt(document.getElementById('numPayments').value),
        interest_rate: parseFloat(document.getElementById('interestRate').value),
        fees: parseFloat(document.getElementById('fees').value)
    };
    
    try {
        const response = await fetch('{{ url_for("bnpl_check") }}', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify({ offer })
        });
        
        if (!response.ok) {
            throw new Error(`Server error: ${response.status}`);
        }
        
        const result = await response.json();
        
        // Hide loading state
        analyzeBtn.disabled = false;
        analyzeBtnText.textContent = 'Analyze BNPL Offer';
        analyzeBtnSpinner.classList.add('hidden');
        
        resultDiv.classList.remove('hidden');
        
        const riskColors = {
            'Low': 'green',
            'Medium': 'yellow',
            'High': 'red'
        };
        
        const riskColor = riskColors[result.risk_level] || 'gray';
        const totalCost = result.total_cost !== null && result.total_cost !== undefined 
            ? `$${result.total_cost.toFixed(2)}` 
            : 'N/A';
        const apr = result.apr !== null && result.apr !== undefined 
            ? `${result.apr.toFixed(2)}%` 
            : 'N/A';
        
        resultDiv.innerHTML = `
            <div class="bg-${riskColor}-50 border border-${riskColor}-300 rounded-lg p-6">
                <h4 class="font-bold text-lg mb-4">Analysis Results</h4>
                <div class="space-y-2 mb-4">
                    <p><strong>Total Cost:</strong> ${totalCost}</p>
                    <p><strong>Effective APR:</strong> ${apr}</p>
                    <p><strong>Risk Level:</strong> <span class="font-bold text-${riskColor}-700">${result.risk_level || 'High'}</span></p>
                </div>
                <div class="bg-white rounded p-4 mb-4">
                    <p class="font-semibold mb-2">⚠️ Warning:</p>
                    <p>${result.warning_message || result.error || 'Unable to analyze offer. Please check your input.'}</p>
                </div>
                <div class="bg-blue-50 rounded p-4">
                    <p class="font-semibold mb-2">💡 Recommendation:</p>
                    <p>${result.recommendation || 'Please review carefully before proceeding.'}</p>
                </div>
                ${result.error ? `<div class="mt-4 text-sm text-red-600">Error: ${result.error}</div>` : ''}
            </div>
        `;
    } catch (error) {
        // Hide loading state
        analyzeBtn.disabled = false;
        analyzeBtnText.textContent = 'Analyze BNPL Offer';
        analyzeBtnSpinner.classList.add('hidden');
        
        resultDiv.classList.remove('hidden');
        resultDiv.innerHTML = `
            <div class="bg-red-50 border border-red-300 rounded-lg p-6">
                <h4 class="font-bold text-lg mb-4 text-red-800">Error</h4>
                <p class="text-red-700">Failed to analyze offer: ${error.message}</p>
                <p class="text-sm text-red-600 mt-2">Please check your input values and try again.</p>
            </div>
        `;
    }
});
</script>
{% endblock %}
